<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sentinel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --accent: #7c6af7;
    --accent2: #5b4fd4;
    --text: #e8e8e8;
    --muted: #888;
    --green: #4caf50;
    --yellow: #ffc107;
    --red: #f44336;
    --border: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 20px 16px 16px;
    text-align: center;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header .sub { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .header .status { font-size: 11px; margin-top: 8px; opacity: 0.7; }
  .header .status.online::before { content: "● "; color: #4caf50; }
  .header .status.offline::before { content: "● "; color: #f44336; }

  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 70px;
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .emoji { display: block; font-size: 18px; margin-bottom: 2px; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  .card {
    background: var(--bg2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-box {
    background: var(--bg3);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .val { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .top-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .top-row:last-child { border-bottom: none; }
  .top-place {
    font-size: 16px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .top-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top-val { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; }

  .profile-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .profile-name { font-size: 16px; font-weight: 600; }
  .profile-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .badge {
    background: var(--bg3);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.accent { border-color: var(--accent); color: var(--accent); }

  .progress-bar {
    background: var(--bg3);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .row:last-child { border-bottom: none; }
  .row .key { color: var(--muted); }
  .row .val { font-weight: 500; }

  .tab-switcher {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .ts-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .ts-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .loading { text-align: center; padding: 30px; color: var(--muted); }
  .error-msg { color: var(--red); font-size: 12px; text-align: center; padding: 10px; }

  .server-input-block {
    background: var(--bg2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .server-input-block label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .server-input-block input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .server-input-block input:focus { border-color: var(--accent); }
  .btn-save {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-save:active { opacity: 0.8; }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 Sentinel</h1>
  <div class="sub" id="chat-name">загрузка...</div>
  <div class="status offline" id="server-status">сервер недоступен</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('stats')"><span class="emoji">📊</span>Стат</div>
  <div class="tab" onclick="showPage('top')"><span class="emoji">🏆</span>Топ</div>
  <div class="tab" onclick="showPage('profile')"><span class="emoji">👤</span>Профиль</div>
  <div class="tab" onclick="showPage('econ')"><span class="emoji">💰</span>Эконом</div>
  <div class="tab" onclick="showPage('settings')"><span class="emoji">⚙️</span>Настр</div>
</div>

<!-- STATS -->
<div class="page active" id="page-stats">
  <div class="loading" id="stats-loading">⏳ Загрузка...</div>
  <div id="stats-content" style="display:none">
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<!-- TOP -->
<div class="page" id="page-top">
  <div class="tab-switcher">
    <div class="ts-btn active" onclick="loadTop('coins', this)">🪙 Коины</div>
    <div class="ts-btn" onclick="loadTop('rep', this)">⭐ Репа</div>
    <div class="ts-btn" onclick="loadTop('messages', this)">💬 Сообщ</div>
  </div>
  <div class="card">
    <div id="top-list"><div class="loading">⏳ Загрузка...</div></div>
  </div>
</div>

<!-- PROFILE -->
<div class="page" id="page-profile">
  <div id="profile-content"><div class="loading">⏳ Загрузка...</div></div>
</div>

<!-- ECON -->
<div class="page" id="page-econ">
  <div id="econ-content"><div class="loading">⏳ Загрузка...</div></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="server-input-block">
    <label>URL сервера (cloudflared tunnel)</label>
    <input type="url" id="server-url" placeholder="https://xxxx.trycloudflare.com" />
    <button class="btn-save" onclick="saveServer()">Сохранить</button>
  </div>
  <div class="server-input-block">
    <label>Chat ID</label>
    <input type="text" id="chat-id-input" placeholder="-1001234567890" />
    <button class="btn-save" onclick="saveChatId()">Сохранить</button>
  </div>
  <div class="card" id="debug-card" style="display:none">
    <div class="card-title">Debug</div>
    <div id="debug-info" style="font-size:11px;color:var(--muted);word-break:break-all;"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f0f0f');
  tg.setBackgroundColor('#0f0f0f');
}

// ── config ──
let SERVER_URL = localStorage.getItem('sentinel_server') || '';
let CHAT_ID = localStorage.getItem('sentinel_chat_id') || '-1003820686132';
let USER_ID = tg?.initDataUnsafe?.user?.id || null;
const INIT_DATA = tg?.initData || '';

document.getElementById('server-url').value = SERVER_URL;
document.getElementById('chat-id-input').value = CHAT_ID;

function saveServer() {
  SERVER_URL = document.getElementById('server-url').value.trim().replace(/\/$/, '');
  localStorage.setItem('sentinel_server', SERVER_URL);
  checkServer();
}
function saveChatId() {
  CHAT_ID = document.getElementById('chat-id-input').value.trim();
  localStorage.setItem('sentinel_chat_id', CHAT_ID);
  loadAll();
}

// ── API ──
async function api(path) {
  if (!SERVER_URL) throw new Error('Сервер не настроен');
  const res = await fetch(`${SERVER_URL}${path}`, {
    headers: { 'x-telegram-init-data': INIT_DATA }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function checkServer() {
  const el = document.getElementById('server-status');
  try {
    await fetch(`${SERVER_URL}/api/ping`);
    el.className = 'status online';
    el.textContent = 'сервер онлайн';
    loadAll();
  } catch {
    el.className = 'status offline';
    el.textContent = 'сервер недоступен';
  }
}

// ── pages ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  const names = ['stats','top','profile','econ','settings'];
  tabs[names.indexOf(name)]?.classList.add('active');
}

function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'млрд';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'млн';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'к';
  return String(n||0);
}

// ── stats page ──
async function loadStats() {
  try {
    const d = await api(`/api/stats/${CHAT_ID}`);
    document.getElementById('stats-loading').style.display = 'none';
    document.getElementById('stats-content').style.display = 'block';
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-box"><div class="val">${d.users}</div><div class="lbl">👥 Участников</div></div>
      <div class="stat-box"><div class="val">${fmtNum(d.total_coins)}</div><div class="lbl">🪙 Всего коинов</div></div>
      <div class="stat-box"><div class="val">${fmtNum(d.total_messages)}</div><div class="lbl">💬 Сообщений</div></div>
      <div class="stat-box"><div class="val">${d.businesses}</div><div class="lbl">🏢 Бизнесов</div></div>
    `;
  } catch(e) {
    document.getElementById('stats-loading').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

// ── top page ──
const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
async function loadTop(by, btn) {
  document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  const el = document.getElementById('top-list');
  el.innerHTML = '<div class="loading">⏳</div>';
  try {
    const rows = await api(`/api/top/${CHAT_ID}?by=${by}&limit=10`);
    const valKey = by;
    const suffix = by === 'coins' ? '🪙' : by === 'rep' ? '⭐' : '💬';
    el.innerHTML = rows.map((r,i) => `
      <div class="top-row">
        <div class="top-place">${medals[i]||i+1}</div>
        <div class="top-name">${r.full_name||'Неизвестный'}</div>
        <div class="top-val">${fmtNum(r[valKey])}${suffix}</div>
      </div>
    `).join('') || '<div class="error-msg">Пусто</div>';
  } catch(e) {
    el.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

// ── profile page ──
async function loadProfile() {
  const el = document.getElementById('profile-content');
  if (!USER_ID) {
    el.innerHTML = '<div class="error-msg">Нет данных пользователя</div>';
    return;
  }
  try {
    const d = await api(`/api/user/${CHAT_ID}/${USER_ID}`);
    const dickBar = Math.min((d.dick?.size||0) / 100 * 100, 100);
    el.innerHTML = `
      <div class="card">
        <div class="profile-header">
          <div class="avatar">👤</div>
          <div>
            <div class="profile-name">${d.full_name||'Неизвестный'}</div>
            <div class="profile-sub">${d.username ? '@'+d.username : 'нет username'}</div>
          </div>
        </div>
        <div class="badges">
          ${d.warns > 0 ? `<div class="badge">⚠️ ${d.warns} варн</div>` : ''}
          ${d.autofarm ? '<div class="badge accent">🤖 Автофарм</div>' : ''}
        </div>
        <div class="row"><span class="key">🪙 Коины</span><span class="val">${fmtNum(d.coins)}</span></div>
        <div class="row"><span class="key">⭐ Репутация</span><span class="val">${d.rep}</span></div>
        <div class="row"><span class="key">💬 Сообщений</span><span class="val">${fmtNum(d.messages)}</span></div>
        <div class="row"><span class="key">🏢 Бизнесов</span><span class="val">${d.businesses?.length||0}</span></div>
        <div class="row"><span class="key">💩 Говно</span><span class="val">${d.poop||0}</span></div>
        ${d.dick ? `
        <div class="row">
          <span class="key">🍆 Пиписька</span>
          <span class="val">${d.dick.size} см</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${dickBar}%"></div></div>
        ` : ''}
        ${d.loan ? `
        <div class="row" style="color:var(--red)"><span class="key">💳 Займ</span><span class="val">${fmtNum(d.loan.amount)}🪙</span></div>
        ` : ''}
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

// ── econ page ──
async function loadEcon() {
  const el = document.getElementById('econ-content');
  try {
    const d = await api(`/api/economy/${CHAT_ID}`);
    const renderMini = (arr, valSuffix) => arr.map((r,i) => `
      <div class="top-row">
        <div class="top-place">${medals[i]}</div>
        <div class="top-name">${r.full_name||'Неизвестный'}</div>
        <div class="top-val">${fmtNum(r.coins||r.size||r.amount||0)}${valSuffix}</div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="card">
        <div class="card-title">🪙 Богатейшие</div>
        ${renderMini(d.topCoins, '🪙')}
      </div>
      <div class="card">
        <div class="card-title">🍆 Топ пиписек</div>
        ${renderMini(d.topDick, ' см')}
      </div>
      <div class="card">
        <div class="card-title">💩 Топ говна</div>
        ${renderMini(d.topPoop, '💩')}
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function loadAll() {
  loadStats();
  loadTop('coins', document.querySelector('.ts-btn'));
  loadProfile();
  loadEcon();
  
  const user = tg?.initDataUnsafe?.user;
  if (user) document.getElementById('chat-name').textContent = user.first_name || 'Sentinel';
}

// инициализация
if (SERVER_URL) checkServer();
else {
  document.getElementById('server-status').textContent = 'настрой URL сервера ниже';
  showPage('settings');
}
</script>
</body>
</html>
